name: Build Kečínok

on:
  push:
    branches: [main]
  workflow_dispatch:   # možnost spustit ručně z GitHubu

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalace závislostí
        run: pip install pyinstaller yt-dlp

      - name: Build .exe
        run: pyinstaller --onefile --windowed --name "Kecinom" kecinom.py

      - name: Upload artefakt
        uses: actions/upload-artifact@v4
        with:
          name: Kecinom-Windows
          path: dist/Kecinom.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalace závislostí
        run: pip install pyinstaller yt-dlp

      - name: Instalace tkinter
        run: brew install python-tk

      - name: Build .app
        run: |
          pyinstaller --onefile --windowed --name "Kecinom" kecinom.py
          # Zabalíme .app do zipu, jinak upload-artifact ztratí permissions
          cd dist
          zip -r Kecinom-macOS.zip Kecinom.app

      - name: Upload artefakt
        uses: actions/upload-artifact@v4
        with:
          name: Kecinom-macOS
          path: dist/Kecinom-macOS.zip
